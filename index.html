<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bulk Letter Generator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1>Bulk Letter Generator</h1>
    </div>
    <div class="container">
      <div class="left-panel">
        <div class="settings">
          <h2>Settings</h2>
          <label for="font-face">Font Face:</label>
          <select id="font-face" name="font-face">
            <option
              value="times-new-roman"
              style="font-family: &quot;Times New Roman&quot;, Times, serif"
            >
              Times New Roman
            </option>
            <option
              value="arial"
              style="font-family: Arial, Helvetica, sans-serif"
            >
              Arial
            </option>
            <option
              value="calibri"
              style="
                font-family:
                  Calibri, Candara, Segoe, &quot;Segoe UI&quot;, Optima, Arial,
                  sans-serif;
              "
            >
              Calibri
            </option>
            <option
              value="helvetica"
              style="font-family: Helvetica, Arial, sans-serif"
            >
              Helvetica
            </option>
            <option
              value="courier-new"
              style="font-family: &quot;Courier New&quot;, Courier, monospace"
            >
              Courier New
            </option>
            <option
              value="georgia"
              style="font-family: Georgia, &quot;Times New Roman&quot;, serif"
            >
              Georgia
            </option>
            <option
              value="garamond"
              style="font-family: Garamond, &quot;Times New Roman&quot;, serif"
            >
              Garamond
            </option>
            <option
              value="verdana"
              style="font-family: Verdana, Geneva, sans-serif"
            >
              Verdana
            </option>
            <option
              value="tahoma"
              style="font-family: Tahoma, Verdana, Segoe, sans-serif"
            >
              Tahoma
            </option>
          </select>
          <label for="font-size">Font Size:</label>
          <input
            type="number"
            id="font-size"
            name="font-size"
            placeholder="Enter font size in px"
            value="12"
          />
          <label for="page-size">Page Size:</label>
          <select id="page-size" name="page-size">
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
          </select>
          <label>Margins (inch):</label>
          <div class="margins-row">
            <div class="margin-field">
              <label for="margin-top" class="margin-label">Top</label>
              <input
                type="number"
                id="margin-top"
                name="margin-top"
                value="1"
              />
            </div>
            <div class="margin-field">
              <label for="margin-right" class="margin-label">Right</label>
              <input
                type="number"
                id="margin-right"
                name="margin-right"
                value="1"
              />
            </div>
            <div class="margin-field">
              <label for="margin-bottom" class="margin-label">Bottom</label>
              <input
                type="number"
                id="margin-bottom"
                name="margin-bottom"
                value="1"
              />
            </div>
            <div class="margin-field">
              <label for="margin-left" class="margin-label">Left</label>
              <input
                type="number"
                id="margin-left"
                name="margin-left"
                value="1"
              />
            </div>
          </div>
          <label for="template">Select Template:</label>
          <select id="template" name="template">
            <option value="">-- Choose a template --</option>
          </select>
          <div class="template-actions">
            <button
              type="button"
              id="download-template"
              class="template-action-button"
            >
              Download Template
            </button>
            <button
              type="button"
              id="upload-template-button"
              class="template-action-button"
            >
              Upload Template
            </button>
            <input
              type="file"
              id="upload-template-input"
              accept="application/json,.json"
              hidden
            />
          </div>
          <div class="csv-actions">
            <label for="upload-csv-input" class="csv-upload-label">
              Upload CSV for Bulk PDF
            </label>
            <input
              type="file"
              id="upload-csv-input"
              accept="text/csv,.csv"
              hidden
            />
            <button
              type="button"
              id="upload-csv-button"
              class="template-action-button"
            >
              Choose CSV File
            </button>
            <button
              type="button"
              id="generate-bulk-pdf"
              class="template-action-button"
            >
              Generate Bulk PDFs
            </button>
            <div id="csv-status" class="csv-status">No CSV uploaded.</div>
          </div>
        </div>
        <div class="additional-info">
          <h2>Information</h2>
          <div class="scrollable-content">
            <div class="variable-section">
              <h4>Variables</h4>
              <div class="variable-container" id="variableContainer">
                <div class="variable-row">
                  <button class="delete-variable" type="button">−</button>
                  <input
                    type="text"
                    placeholder="Variable Name"
                    class="variable-name"
                  />
                  <input
                    type="text"
                    placeholder="Variable Value"
                    class="variable-value"
                  />
                  <button class="add-variable" type="button">+</button>
                </div>
              </div>
            </div>
            <h4>Letter Content:</h4>
            <div class="markup-toolbar" aria-label="Letter formatting toolbar">
              <button
                type="button"
                class="markup-button"
                data-open="[b]"
                data-close="[/b]"
              >
                Bold
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[i]"
                data-close="[/i]"
              >
                Italic
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[u]"
                data-close="[/u]"
              >
                Underline
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[large]"
                data-close="[/large]"
              >
                Large
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[left]"
                data-close="[/left]"
              >
                Left
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[center]"
                data-close="[/center]"
              >
                Center
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[right]"
                data-close="[/right]"
              >
                Right
              </button>
              <button
                type="button"
                class="markup-button"
                data-open="[justify]"
                data-close="[/justify]"
              >
                Justify
              </button>
            </div>
            <div class="markup-help">
              Select text, then click a button to wrap it with markup. Use
              variables like [$Name].
            </div>
            <textarea
              id="letter"
              name="letter"
              placeholder="Enter the content of your letter here..."
            ></textarea>
          </div>
        </div>
      </div>
      <div class="preview">
        <div class="preview-header">
          <h2>Letter Preview</h2>
          <button type="button" id="print-pdf" class="floating-preview-button">
            Print PDF
          </button>
        </div>
      </div>
    </div>
    <div class="footer">
      © 2026 <a href="https://nahidhe.me">Nahid Hasan</a>. All rights reserved.
    </div>

    <script
      src="https://kit.fontawesome.com/a076d05399.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
